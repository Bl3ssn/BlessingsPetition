<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Create Petition</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav>
    <a th:href="@{/petitions}">Home</a>
    <a th:href="@{/petitions/create}">Create Petition</a>
    <a th:href="@{/petitions/search}">Search</a>
</nav>

<h1>Start a New Petition</h1>

<form th:action="@{/petitions/save}" th:object="${petition}" method="post">

    <label for="title">Title</label>
    <input type="text" id="title" th:field="*{title}" placeholder="Enter petition title" required>

    <label for="description">Description</label>
    <textarea id="description" th:field="*{description}" placeholder="Describe your petition..." required></textarea>

    <label for="creatorName">Your Name</label>
    <input type="text" id="creatorName" th:field="*{creatorName}" placeholder="Enter your name" required>

    <button type="submit">Publish Petition</button>

</form>

<div style="text-align: center; margin-top: 20px;">
    <a href="/petitions">← Back to Petitions</a>
</div>

</body>
</html>
