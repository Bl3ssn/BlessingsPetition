<!DOCTYPE html>
<html>
<body>
<h1>Start a New Petition</h1>
<form th:action="@{/petitions/save}" th:object="${petition}" method="post">
    <label>Title:</label><br>
    <input type="text" th:field="*{title}" required><br><br>

    <label>Description:</label><br>
    <textarea th:field="*{description}" required></textarea><br><br>

    <label>Your Name:</label><br>
    <input type="text" th:field="*{creatorName}" required><br><br>

    <button type="submit">Publish Petition</button>
</form>
<br>
<a href="/petitions">Back to List</a>
</body>
</html>
