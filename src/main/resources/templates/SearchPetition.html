<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Search Petition</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav>
    <a href="/petitions">Home</a>
    <a href="/petitions/create">Create Petition</a>
    <a href="/petitions/search">Search</a>
</nav>

<h1>Search for a Petition</h1>

<form action="/petitions/search" method="get">

    <label for="title">Keyword</label>
    <input type="text" id="title" name="title" placeholder="Enter petition title or keyword..." required>

    <button type="submit">🔍 Search</button>

</form>

<div style="text-align: center; margin-top: 20px;">
    <a href="/petitions">← Back to Petitions</a>
</div>

</body>
</html>
