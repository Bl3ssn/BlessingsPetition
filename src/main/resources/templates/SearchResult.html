<!DOCTYPE html>
<html>
<body>
<h1>Search Results for: <span th:text="${searchQuery}"></span></h1>
<div th:if="${#lists.isEmpty(results)}">
    <p>No petitions found matching that title.</p>
</div>
<ul>
    <li th:each="result : ${results}">
        <a th:href="@{'/petitions/' + ${result.id}}" th:text="${result.title}"></a>
    </li>
</ul>
<a href="/petitions/search">Search again</a> | <a href="/petitions">Home</a>
</body>
</html>
